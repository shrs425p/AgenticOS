# AgenticOs user config
# Keep this file small. Advanced defaults live in config/*.yaml.
# Values here override the layered files.

agent:
  provider: nvidia
  workspace: workspace
  stream: true
cloud:
  nvidia:
    model: openai/gpt-oss-120b
autonomy:
  autopilot: true
  startup_provider_prompt: false
  startup_model_prompt: false
  power_mode: true
log_level: INFO
log_level: INFO
