# AgenticOs layered config: 50-storage.yaml
# Edit this file for advanced settings in this area.

memory:
  max_messages: 500
  summarise_after: 200
  json_filename: memory.json
  enable_persistence: true
  auto_summarize: true
  backend: sqlite
  sqlite_db_path: data/memory.sqlite3
  record_tool_events: true
  record_artifacts: true
  redact_secrets: true
cache:
  root_dir: data/cache
logging:
  enabled: true
  level: DEBUG
  file: agent.log
  max_size: 10MB
  backup_count: 5
  console_output: true
  audit_enabled: true
  audit_format: both
  audit_dir: data/logs
