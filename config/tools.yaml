# AgenticOs layered config: 40-tools.yaml
# Edit this file for advanced settings in this area.

tools:
  files: true
  terminal: true
  web: true
  browser: true
  calculator: true
  datetime_tool: true
terminal:
  note_pad: true
  notifications: true
  system_monitor: true
  process_manager: true
  network_tools: true
  registry_editor: false
  service_manager: false
  scheduler: true
  automation: true
custom_keys:
  screenshot: win+shift+s
  fullscreen_shot: printscreen
  window_shot: alt+printscreen
  show_desktop: win+d
  lock_screen: win+l
  file_explorer: win+e
  run_dialog: win+r
  search: win+s
  task_view: win+tab
  virtual_desktop_new: win+ctrl+d
  virtual_desktop_next: win+ctrl+right
  virtual_desktop_prev: win+ctrl+left
  action_center: win+a
  settings: win+i
  task_manager: ctrl+shift+esc
  emoji_picker: win+.
  new_tab: ctrl+t
  close_tab: ctrl+w
  reopen_tab: ctrl+shift+t
  next_tab: ctrl+tab
  prev_tab: ctrl+shift+tab
  refresh: f5
  hard_refresh: ctrl+f5
  address_bar: alt+d
  fullscreen: f11
  zoom_in: ctrl+plus
  zoom_out: ctrl+-
  zoom_reset: ctrl+0
  select_all: ctrl+a
  copy: ctrl+c
  cut: ctrl+x
  paste: ctrl+v
  paste_plain: ctrl+shift+v
  undo: ctrl+z
  redo: ctrl+y
  find: ctrl+f
  find_replace: ctrl+h
  save: ctrl+s
  save_all: ctrl+shift+s
  close_window: alt+f4
  switch_window: alt+tab
  bold: ctrl+b
  italic: ctrl+i
  underline: ctrl+u
  open_terminal: ctrl+shift+grave
  split_terminal: ctrl+shift+5
  command_palette: ctrl+shift+p
  go_to_file: ctrl+p
  toggle_sidebar: ctrl+b
  format_document: shift+alt+f
  toggle_comment: ctrl+slash
  debug_start: f5
  debug_stop: shift+f5
  debug_step_over: f10
  debug_step_into: f11
timeouts:
  list_models: 10
  download_curl: 120
  download_powershell: 180
  api_default: 180
  fallback_max_tokens: 1024
  web_fetch: 15
  web_api: 20
  web_search: 15
  web_download: 120
  web_inspect: 15
  web_utils: 20
  web_graphql: 25
