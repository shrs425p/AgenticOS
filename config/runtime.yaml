# AgenticOs layered config: 20-runtime.yaml
# Edit this file for advanced settings in this area.

agent:
  provider: nvidia
  max_iterations: 1000
  think_before_act: false
  verbose_thinking: false
  auto_confirm: true
  auto_retry: true
  enable_cov: false
  max_retries: 3
  retry_delay: 1
  stream: true
  self_healing: true
  auto_recovery: true
  persistent_tasks: true
  workspace: workspace
  log_level: INFO
  enable_sandbox: false
  allow_system_modification: true
  hot_reload: true
  max_observation_chars: 4000

autonomy:
  task_tracking: true
  active_planning: true
  startup_model_prompt: false
  startup_provider_prompt: false
  autopilot: true
  minimal_clarifications: true
  enforce_progress: true
  power_mode: true
  validate_results: true
  expert_mode: false

heuristics:
  dream_interval_hours: 6
  slow_task_threshold_seconds: 120
  dream_task_limit: 15
  prose_vs_tool_threshold: 120
  hot_reload_throttle: 2.0
  max_dots_in_response: 50
  iteration_warning_threshold: 20
  new_task_min_chars: 10
  direct_response_max_chars: 6000
  direct_response_max_words: 900
  resumption_cmds: ["continue", "next"]
  session_id_format: "%Y%m%d_%H%M%S"

performance:
  max_retries: 5
  base_retry_delay: 5.0
  max_context_messages: 40
  max_pref_chars: 80
  max_pref_items: 20

browser:
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
  viewport:
    width: 1280
    height: 900
  text_truncation_limit: 20000
  html_truncation_limit: 50000

media:
  ocr_engine: "auto" # Options: tesseract, native, auto
  tesseract_path: "tools/Tesseract-OCR/tesseract.exe"
  ocr_language_default: "en-US"
  ocr_confidence_threshold: 0.6
  screenshot_format: "png"

logging:
  args_truncation_limit: 2000
  validation_truncation_limit: 500
  observation_truncation_limit: 800
  error_truncation_limit: 4000
  audit_enabled: true
  audit_format: "jsonl"

ui:
  category_symbols:
    files:
      tokens: ["file", "read", "write", "dir", "delete", "path", "move"]
      symbol: "[F]"
    terminal:
      tokens: ["run", "exec", "cmd", "ps", "terminal", "shell"]
      symbol: "[T]"
    web:
      tokens: ["web", "search", "get", "post", "url", "scrape"]
      symbol: "[W]"
    math:
      tokens: ["calc", "math", "sum", "average"]
      symbol: "[M]"
    notes:
      tokens: ["note", "pad", "list", "clear"]
      symbol: "[N]"
    canvas:
      tokens: ["canvas"]
      symbol: "[C]"
    system:
      tokens: ["sys", "cpu", "mem", "process", "service"]
      symbol: "[S]"
    registry:
      tokens: ["reg", "key", "value"]
      symbol: "[R]"

parser:
  keywords:
    - "OBJECTIVE:"
    - "STATE:"
    - "REASONING:"
    - "THOUGHT:"
    - "PLAN:"
    - "ACTION:"
    - "FINAL ANSWER:"
    - "OBSERVATION:"

hot_reload:
  tracked_dirs:
    - "core"
    - "tools"
    - "scripts"
  retry_backoff: true
  fallback_strategies: true
  error_logging: true
  crash_recovery: true

windows_paths:
  uninstall_registry: "HKLM:\\Software\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\*"
  wow6432_uninstall_registry: "HKLM:\\Software\\WOW6432Node\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\*"
  desktop_registry: "HKCU:\\Control Panel\\Desktop"
