name: Auto-Merge Bot
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-approve-and-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'google-labs-jules' || github.actor == 'shrs425p'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Auto-merge and cleanup
        run: |
          # The --delete-branch flag tells GitHub to kill the branch as soon as it merges
          gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
