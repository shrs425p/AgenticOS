name: Bandit
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  bandit:
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Required to upload results to the Security tab
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit and Generate Report
        # -r: recursive, -ll: only Low/Med/High (hides Notes), -f sarif: format for GitHub
        run: bandit -r . -ll -f sarif -o bandit-results.sarif || true

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif