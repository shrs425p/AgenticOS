name: Dependency Review

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    # Dependency review requires a PR context to diff dependencies.
    # On plain pushes we run pip-audit as a fallback full scan instead.
    steps:
      - uses: actions/checkout@v7

      - name: Dependency Review (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v5
        with:
          comment-summary-in-pr: always
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

      - name: Full dependency audit (push / manual)
        if: github.event_name != 'pull_request'
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --format=json > pip-audit-results.json || true
          pip-audit -r requirements.txt

      - name: Upload pip-audit results
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          retention-days: 7
