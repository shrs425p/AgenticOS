name: Bug report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: dropdown
    id: version
    attributes:
      label: AgenticOS Version
      options:
        - v2.1.0 (Portable & Resilient)
        - v2.0.0 (Hardened)
        - v1.5.0
        - Development (Main)
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: LLM Provider
      options:
        - Ollama (Local)
        - NVIDIA NIM
        - Google Gemini
        - Groq
        - OpenAI
        - Other
    validations:
      required: true
  - type: textarea
    id: bug-description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run 'agent'
        2. Give command '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant logs from `data/logs/errors.log` or terminal output.
      render: shell
